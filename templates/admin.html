<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
</head>
<body>

<h1>ACE Coaching Classes Admin Panel</h1>

<h2>Registered Students</h2>

<table border="1" cellpadding="10">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
</tr>

{% for user in users %}

<tr>
<td>{{ user.id }}</td>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
