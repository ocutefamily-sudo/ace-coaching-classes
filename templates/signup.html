<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
</head>
<body>

<h1>ACE Coaching Classes Signup</h1>

<form method="POST">

<input
type="text"
name="name"
placeholder="Full Name"
required>

<br><br>

<input
type="email"
name="email"
placeholder="Email"
required>

<br><br>

<input
type="password"
name="password"

required>

<button type="submit">
Create Account
</button>

</form>

</body>
</html>
